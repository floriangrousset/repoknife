name: release

on:
  push:
    branches: [main]

permissions:
  contents: write   # create tags + releases

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      released: ${{ steps.gate.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need tags for the idempotency check

      - name: extract VERSION
        id: ver
        run: |
          v="$(grep -E '^VERSION="[0-9]+\.[0-9]+\.[0-9]+"' repoknife \
                 | head -1 | sed -E 's/^VERSION="([^"]+)".*/\1/')"
          if [ -z "$v" ]; then echo "could not parse VERSION from repoknife" >&2; exit 1; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "VERSION=$v"

      - name: idempotency gate (skip if tag/release exists)
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.ver.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null \
             || gh release view "$tag" >/dev/null 2>&1; then
            echo "tag $tag already exists -> skipping release"
            echo "released=false" >> "$GITHUB_OUTPUT"
          else
            echo "released=true" >> "$GITHUB_OUTPUT"
          fi

      - name: shellcheck
        if: steps.gate.outputs.released == 'true'
        run: shellcheck repoknife

      - name: selftest
        if: steps.gate.outputs.released == 'true'
        run: ./repoknife _selftest

      - name: guard string present
        if: steps.gate.outputs.released == 'true'
        run: |
          grep -q 'requires bash >= 4.4' repoknife \
            || { echo "guard string missing" >&2; exit 1; }
          bash ./repoknife --version

      - name: build assets
        if: steps.gate.outputs.released == 'true'
        run: |
          mkdir -p dist
          cp repoknife dist/repoknife
          chmod +x dist/repoknife
          ( cd dist && shasum -a 256 repoknife > repoknife.sha256 )
          cat dist/repoknife.sha256

      - name: create tag + release
        if: steps.gate.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          tag="v$VERSION"
          git tag "$tag"
          git push origin "$tag"
          notes="$(printf '%s\n' \
            "repoknife $tag" \
            "" \
            "Install / upgrade:" \
            '```' \
            "brew install floriangrousset/tap/repoknife   # first time" \
            "brew upgrade repoknife                        # update" \
            '```' \
            "" \
            "Assets: the plain \`repoknife\` script + \`repoknife.sha256\`.")"
          gh release create "$tag" --title "$tag" --notes "$notes" \
            dist/repoknife dist/repoknife.sha256

  bump-tap:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: bump homebrew formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: repoknife
          formula-path: Formula/repoknife.rb
          homebrew-tap: floriangrousset/homebrew-tap
          tag-name: v${{ needs.release.outputs.version }}
          download-url: https://github.com/floriangrousset/repoknife/archive/refs/tags/v${{ needs.release.outputs.version }}.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
