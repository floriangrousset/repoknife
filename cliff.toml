# git-cliff configuration — https://git-cliff.org
# Generates CHANGELOG.md AND computes the next SemVer from Conventional Commits.
# Used by the release pipeline (.github/workflows/release.yml) and `make changelog`.

[remote.github]
owner = "floriangrousset"
repo = "repoknife"

[changelog]
header = """
# Changelog

All notable changes to **repoknife** are documented here.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and the project follows [Semantic Versioning](https://semver.org/spec/v2.0.0.html)
driven by [Conventional Commits](https://www.conventionalcommits.org).
"""
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
          {{ commit.message | split(pat="\n") | first | upper_first | trim }}\
          {% if commit.id %} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/commit/{{ commit.id }})){% endif %}\
    {% endfor %}
{% endfor %}
"""
footer = """
{% for release in releases -%}
    {% if release.version -%}
        {% if release.previous.version -%}
            [{{ release.version | trim_start_matches(pat="v") }}]: https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/compare/{{ release.previous.version }}..{{ release.version }}
        {% else -%}
            [{{ release.version | trim_start_matches(pat="v") }}]: https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/releases/tag/{{ release.version }}
        {% endif -%}
    {% else -%}
        [unreleased]: https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/compare/{{ release.previous.version }}..HEAD
    {% endif -%}
{% endfor %}
<!-- generated by git-cliff -->
"""
trim = true
# Keep-a-Changelog spacing: a blank line before each release heading and before the
# link-reference block (git-cliff trims per-section, so these run on the rendered text).
postprocessors = [
  { pattern = '(?m)^## \[', replace = '''

## [''' },
  { pattern = '(?m)^\[([A-Za-z0-9])', replace = '''

[${1}''' },
]

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# Group by Conventional Commit type. The <!-- N --> prefix orders the sections
# (git-cliff sorts groups by string); `striptags` hides the marker in the output.
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactoring" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^test", group = "<!-- 5 -->Testing" },
  { message = "^(ci|build)", group = "<!-- 6 -->CI & Build" },
  { message = "^chore\\(release\\):", skip = true },
  { message = "^chore", skip = true },
  { message = "^style", skip = true },
  { message = "^Merge", skip = true },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "newest"

[bump]
# SemVer rules: a breaking change → major, a feat → minor, anything else → patch.
features_always_bump_minor = true
breaking_always_bump_major = true
