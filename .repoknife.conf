# repoknife configuration — starter template
#
# The live config is read from <code-root>/.repoknife.conf — the folder that
# holds your github/ · gitlab/ · azure-devops/ provider trees. This committed
# copy is never read from inside the repo; it's a starting point:
#
#   cp ~/Code/github/floriangrousset/repoknife/.repoknife.conf ~/Code/
#
# Format: KEY=VALUE, one per line · '#' starts a comment · unknown keys are
# ignored with a warning · parsed line-by-line with a key allowlist, NEVER
# sourced — values are taken literally. Empty values = built-in defaults.

# Extra orgs/accounts to offer beyond the ones auto-discovered from your
# folders — comma-separated (e.g. acme, other-org)
extra_orgs_github=
extra_orgs_gitlab=
extra_orgs_azure-devops=

# Default Azure DevOps organization
ado_default_org=

# Azure DevOps org→project pairs, comma-separated — an org may repeat
# (e.g. corp:Platform, corp:Mobile, other-org:Proj)
ado_project_map=

# Visibility for repos created by Init: private | public  (default: private)
default_visibility=

# Hide forks from Sync repo lists by default: true | false  (default: false)
exclude_forks_default=
