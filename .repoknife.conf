# repoknife configuration
#
# Where it's read from:
#   • brew / installed   →  ~/.repoknife.conf
#   • dev run from a clone (./repoknife)  →  this file, next to the script
# This committed copy doubles as the starter template AND the dev config. To
# seed an installed setup:  cp .repoknife.conf ~/.repoknife.conf
# (REPOKNIFE_CFG_FILE overrides the location explicitly.)
#
# Format: KEY=VALUE, one per line · '#' starts a comment · unknown keys are
# ignored with a warning · parsed line-by-line with a key allowlist, NEVER
# sourced — values are taken literally. Empty values = built-in defaults.

# Where your provider trees live — the folder holding github/ · gitlab/ ·
# azure-devops/. Default: ~/Code. A leading ~ is expanded to $HOME.
# (REPOKNIFE_CODE_ROOT env var overrides this.)
code_root=

# Extra orgs/accounts to offer beyond the ones auto-discovered from your
# folders — comma-separated (e.g. acme, other-org)
extra_orgs_github=
extra_orgs_gitlab=
extra_orgs_azure-devops=

# Default Azure DevOps organization — used by `sync` when no --org is passed.
# OPTIONAL: when signed in (`az login`), orgs are auto-discovered and offered in
# the picker; set this only to pin a default and skip the org picker.
ado_default_org=

# Azure DevOps org→project pairs, comma-separated — an org may repeat
# (e.g. corp:Platform, corp:Mobile, other-org:Proj).
# OPTIONAL: when signed in, projects are auto-discovered via `az devops project
# list`; this is now only an offline/CI fallback (used when az is unavailable).
ado_project_map=

# Visibility for repos created by Init: private | public  (default: private)
default_visibility=

# Hide forks from Sync repo lists by default: true | false  (default: false)
exclude_forks_default=
